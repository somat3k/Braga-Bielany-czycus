name: QuantRocket Automation

on:
  push:
  pull_request:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  check-build-and-logs:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime tools
        run: |
          sudo apt-get update
          sudo apt-get install -y redis-tools
          python -m pip install --upgrade pip
          pip install "quantrocket-client~=2.0"

      - name: Start Redis via Docker Compose
        run: |
          docker compose up -d redis
          for i in $(seq 1 15); do
            if redis-cli -h 127.0.0.1 -p 6379 ping 2>/dev/null | grep -q PONG; then
              echo "Redis is up on localhost:6379"
              break
            fi
            echo "Waiting for Redis... attempt $i/15"
            sleep 2
          done

      - name: Build/check baseline
        run: |
          python --version
          pip show quantrocket-client
          redis-cli -h 127.0.0.1 -p 6379 ping

      - name: Verify Redis connectivity from within Docker network
        run: |
          docker compose exec -T redis \
            redis-cli -h redis -p 6379 ping

      - name: Persist run logs and state checkpoint
        run: |
          mkdir -p artifacts/checkpoints
          {
            echo "run_id=${GITHUB_RUN_ID}"
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "timestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          } | tee artifacts/run.log
          redis-cli -h 127.0.0.1 -p 6379 info all > artifacts/redis-info.log
          cat > artifacts/checkpoints/run-checkpoint.json <<'JSON'
          {
            "checkpoint": "quantrocket-automation",
            "snapshot": "artifacts/redis-info.log",
            "weights": "external-model-artifacts",
            "status": "captured"
          }
          JSON

      - name: Upload automation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quantrocket-automation-artifacts
          path: artifacts
